name: Watch files in external repo

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest

    steps:
      - name: Check out this repo
        uses: actions/checkout@v4

      - name: Run watcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import json
          import os
          import pathlib
          import re
          import urllib.request
          import urllib.parse

          WATCHERS = [
              {
                  "label": "Simplify Repo",
                  "owner": "SimplifyJobs",
                  "repo": "Summer2026-Internships",
                  "branch": "dev",
                  "file": "README-Off-Season.md",
                  "parser": "html",
              },
              {
                  "label": "Vansh Repo",
                  "owner": "vanshb03",
                  "repo": "Summer2027-Internships",
                  "branch": "dev",
                  "file": "OFFSEASON_README.md",
                  "parser": "markdown",
              },
          ]

          STATE_FILE = pathlib.Path(".watcher_state.json")

          def get_json(url):
              token = os.environ["GITHUB_TOKEN"]
              req = urllib.request.Request(
                  url,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "User-Agent": "github-actions-file-watcher",
                      "Authorization": f"Bearer {token}",
                  },
              )
              with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read().decode())

          def send_telegram(text):
              token = os.environ["TELEGRAM_BOT_TOKEN"]
              chat_id = os.environ["TELEGRAM_CHAT_ID"]
              data = urllib.parse.urlencode({
                  "chat_id": chat_id,
                  "text": text,
                  "disable_web_page_preview": "true",
              }).encode()
              req = urllib.request.Request(
                  f"https://api.telegram.org/bot{token}/sendMessage",
                  data=data,
                  method="POST",
              )
              with urllib.request.urlopen(req) as resp:
                  resp.read()

          def strip_html(html):
              html = re.sub(r'<\s*/?\s*br\s*/?\s*>', ' ', html, flags=re.IGNORECASE)
              text = re.sub(r'<[^>]+>', '', html)
              return text.replace('&amp;', '&').replace('&lt;', '<').replace('&gt;', '>').strip()

          def collect_row(lines, i, prefix):
              cells = []
              i += 1
              while i < len(lines):
                  l = lines[i]
                  raw = l[1:] if l and l[0] in ('+', '-', ' ') else l
                  s = raw.strip()
                  if not l.startswith(prefix):
                      return None, i
                  if s == '</tr>':
                      return cells, i + 1
                  if s.startswith('<td>'):
                      buf = s[4:]
                      while '</td>' not in buf and i + 1 < len(lines):
                          i += 1
                          r2 = lines[i][1:] if lines[i] and lines[i][0] in ('+', '-', ' ') else lines[i]
                          buf += ' ' + r2.strip()
                      if buf.endswith('</td>'):
                          buf = buf[:-5]
                      cells.append(strip_html(buf))
                  i += 1
              return None, i

          def parse_html_table(patch):
              added, removed = [], []
              lines = patch.splitlines()
              i = 0
              while i < len(lines):
                  l = lines[i]
                  raw = l[1:] if l and l[0] in ('+', '-', ' ') else l
                  if raw.strip() == '<tr>':
                      if l.startswith('+'):
                          cells, i = collect_row(lines, i, '+')
                          if cells and len(cells) >= 4:
                              added.append(cells)
                          continue
                      elif l.startswith('-'):
                          cells, i = collect_row(lines, i, '-')
                          if cells and len(cells) >= 4:
                              removed.append(cells)
                          continue
                  i += 1
              return added, removed

          def parse_markdown_table(patch):
              added, removed = [], []
              for line in patch.splitlines():
                  if line.startswith('+++') or line.startswith('---'):
                      continue
                  if not (line.startswith('+') or line.startswith('-')):
                      continue
                  body = line[1:].strip()
                  if not body.startswith('|'):
                      continue
                  raw_cells = [c.strip() for c in body.strip('|').split('|')]
                  # skip separator rows: | --- | --- | ...
                  if all(re.fullmatch(r'[-:\s]+', c) for c in raw_cells if c):
                      continue
                  # Vansh format: company | role | location | apply-link | date
                  # drop the apply-link column (index 3) if present
                  if len(raw_cells) >= 5:
                      picked = [raw_cells[0], raw_cells[1], raw_cells[2], raw_cells[4]]
                  elif len(raw_cells) >= 4:
                      picked = raw_cells[:4]
                  else:
                      continue
                  cells = [strip_html(c) for c in picked]
                  if line.startswith('+'):
                      added.append(cells)
                  else:
                      removed.append(cells)
              return added, removed

          def fmt(cells):
              company, role, location, term = cells[0], cells[1], cells[2], cells[3]
              return f"{company} — {role} | {location} | {term}"

          def key(c):
              return (c[0], c[1], c[2], c[3])

          def build_change_lines(added, removed):
              added_keys = {key(c) for c in added}
              removed_keys = {key(c) for c in removed}
              moved_keys = added_keys & removed_keys

              new_listings = [c for c in added if key(c) not in moved_keys]
              gone_listings = [c for c in removed if key(c) not in moved_keys]
              moved_listings = []
              seen = set()
              for c in added:
                  k = key(c)
                  if k in moved_keys and k not in seen:
                      moved_listings.append(c)
                      seen.add(k)

              lines = []
              if new_listings:
                  lines += [f"New listings ({len(new_listings)}):"]
                  lines += [f"+ {fmt(c)}" for c in new_listings]
              if gone_listings:
                  if lines:
                      lines += [""]
                  lines += [f"Removed listings ({len(gone_listings)}):"]
                  lines += [f"- {fmt(c)}" for c in gone_listings]
              if moved_listings:
                  if lines:
                      lines += [""]
                  lines += [f"Moved between sections ({len(moved_listings)}):"]
                  lines += [f"~ {fmt(c)}" for c in moved_listings]
              return lines

          # --- Load and migrate state ---
          if STATE_FILE.exists():
              state = json.loads(STATE_FILE.read_text())
          else:
              state = {}

          # Migrate old {"last_sha": ...} shape to keyed-by-repo shape.
          if "last_sha" in state and isinstance(state.get("last_sha"), str):
              state = {"SimplifyJobs/Summer2026-Internships": {"last_sha": state["last_sha"]}}

          # --- Process each watcher ---
          sections = []
          any_changes = False
          for w in WATCHERS:
              repo_key = f"{w['owner']}/{w['repo']}"
              latest = get_json(f"https://api.github.com/repos/{repo_key}/commits/{w['branch']}")
              latest_sha = latest["sha"]
              last_sha = (state.get(repo_key) or {}).get("last_sha")

              if not last_sha:
                  state[repo_key] = {"last_sha": latest_sha}
                  sections.append(f"{w['label']}:\nInitialized.")
                  print(f"Initialized {repo_key} at {latest_sha}.")
                  continue

              if last_sha == latest_sha:
                  sections.append(f"{w['label']}:\nNo changes.")
                  continue

              compare = get_json(f"https://api.github.com/repos/{repo_key}/compare/{last_sha}...{latest_sha}")
              matched_files = [f for f in compare.get("files", []) if f["filename"] == w["file"]]

              if not matched_files:
                  sections.append(f"{w['label']}:\nNo changes.")
                  state[repo_key] = {"last_sha": latest_sha}
                  continue

              parser = parse_html_table if w["parser"] == "html" else parse_markdown_table
              added, removed = [], []
              for f in matched_files:
                  a, r = parser(f.get("patch", ""))
                  added.extend(a)
                  removed.extend(r)

              change_lines = build_change_lines(added, removed)
              compare_url = compare.get("html_url", f"https://github.com/{repo_key}/compare/{last_sha}...{latest_sha}")

              if not change_lines:
                  sections.append(f"{w['label']}:\nNo changes.")
              else:
                  sections.append(f"{w['label']}:\n" + "\n".join(change_lines) + f"\n\n{compare_url}")
                  any_changes = True

              state[repo_key] = {"last_sha": latest_sha}

          if any_changes:
              send_telegram("**JOB BOARD UPDATE**\n\n" + "\n\n".join(sections))
              print("Sent Telegram alert.")
          else:
              print("No changes in any watched repo; skipping Telegram.")

          STATE_FILE.write_text(json.dumps(state, indent=2))
          PY

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .watcher_state.json
          git diff --cached --quiet || git commit -m "Update watcher state"
          git push
