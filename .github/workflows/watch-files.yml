name: Watch files in external repo

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: repo-watcher-state
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest

    steps:
      - name: Check out this repo
        uses: actions/checkout@v4

      - name: Run watcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import hashlib
          import json
          import os
          import pathlib
          import re
          import time
          import urllib.error
          import urllib.parse
          import urllib.request

          WATCHERS = [
              {
                  "label": "Simplify Off-Season Repo",
                  "enabled": False,  # paused — off-season; flip to True to resume
                  "state_key": "SimplifyJobs/Summer2026-Internships",
                  "owner": "SimplifyJobs",
                  "repo": "Summer2026-Internships",
                  "branch": "dev",
                  "file": "README-Off-Season.md",
                  "parser": "html",
                  "section_start": "## 💻 Software Engineering Internship Roles",
                  "section_end": "<summary>🗃️ Inactive roles",
                  "term_col": 3,
                  "apply_col": 4,
                  "default_term": "",
              },
              {
                  "label": "Simplify Summer Repo",
                  "state_key": "SimplifyJobs/Summer2026-Internships#summer",
                  "owner": "SimplifyJobs",
                  "repo": "Summer2026-Internships",
                  "branch": "dev",
                  "file": "README.md",
                  "parser": "html",
                  "section_start": "## 💻 Software Engineering Internship Roles",
                  "section_end": "## 📱 Product Management Internship Roles",
                  "term_col": None,
                  "apply_col": 3,
                  "default_term": "Summer 2026",
              },
              {
                  "label": "Vansh Off-Season Repo",
                  "enabled": False,  # paused — off-season; flip to True to resume
                  "state_key": "vanshb03/Summer2027-Internships",
                  "owner": "vanshb03",
                  "repo": "Summer2027-Internships",
                  "branch": "dev",
                  "file": "OFFSEASON_README.md",
                  "parser": "markdown",
                  "section_start": "## The List",
                  "section_end": "## We love our contributors",
              },
              {
                  "label": "Vansh Summer Repo",
                  "state_key": "vanshb03/Summer2027-Internships#summer",
                  "owner": "vanshb03",
                  "repo": "Summer2027-Internships",
                  "branch": "dev",
                  "file": "README.md",
                  "parser": "markdown",
                  "section_start": "## The List",
                  "section_end": "## We love our contributors",
              },
              {
                  # Zapply's SWE table re-sorts + is capped at ~100 rows every ~15 min, so
                  # rows churn in/out of the visible window. Snapshot-diff dedup would re-alert
                  # on every re-add, and the truncated role text makes (company, role, location,
                  # term) a colliding key. So this source uses cumulative-URL dedup instead.
                  "label": "Zapply Summer Repo",
                  "state_key": "zapplyjobs/Internships-2027#swe",
                  "owner": "zapplyjobs",
                  "repo": "Internships-2027",
                  "branch": "main",
                  "file": "README.md",
                  "parser": "markdown",
                  "section_start": "💻 <strong>Software Engineering</strong>",
                  "section_end": "📊 <strong>Data Science",  # substring: stop before the "&"
                  "role_col": 1,
                  "loc_col": 2,
                  "apply_col": 5,
                  "term_col": None,
                  "default_term": "Summer 2027",
                  "min_cells": 6,
                  "strip_bold": True,
                  "dedup": "cumulative_url",
              },
          ]

          STATE_FILE = pathlib.Path(".watcher_state.json")
          BOT_STATE_FILE = pathlib.Path(".bot_state.json")
          URL_CAP = 3000  # bound seen-URL growth for cumulative-URL sources; >> the <1-week / ~100-row fresh window

          def urlopen_with_retry(req, attempts=3):
              for i in range(attempts):
                  try:
                      return urllib.request.urlopen(req)
                  except (urllib.error.URLError, ConnectionResetError, TimeoutError) as e:
                      if isinstance(e, urllib.error.HTTPError) and e.code < 500:
                          raise
                      if i + 1 == attempts:
                          raise
                      print(f"Network retry {i + 1}/{attempts}: {type(e).__name__}: {e}")
                      time.sleep(2 ** i)

          def gh_request(url):
              token = os.environ["GITHUB_TOKEN"]
              return urllib.request.Request(
                  url,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "User-Agent": "github-actions-file-watcher",
                      "Authorization": f"Bearer {token}",
                  },
              )

          def get_json(url):
              with urlopen_with_retry(gh_request(url)) as resp:
                  return json.loads(resp.read().decode())

          def get_raw_file(owner, repo, sha, path):
              url = f"https://raw.githubusercontent.com/{owner}/{repo}/{sha}/{path}"
              with urlopen_with_retry(gh_request(url)) as resp:
                  return resp.read().decode()

          def telegram_send_job(text, callback_data):
              token = os.environ["TELEGRAM_BOT_TOKEN"]
              chat_id = os.environ["TELEGRAM_CHAT_ID"]
              payload = {
                  "chat_id": chat_id,
                  "text": text,
                  "disable_web_page_preview": True,
                  "reply_markup": {
                      "inline_keyboard": [[
                          {"text": "Mark as Applied", "callback_data": callback_data}
                      ]],
                  },
              }
              req = urllib.request.Request(
                  f"https://api.telegram.org/bot{token}/sendMessage",
                  data=json.dumps(payload).encode(),
                  method="POST",
                  headers={"Content-Type": "application/json"},
              )
              with urlopen_with_retry(req) as resp:
                  body = json.loads(resp.read().decode())
              return body["result"]["message_id"], body["result"]["chat"]["id"]

          def job_hash(entry, source):
              key_str = f"{source}|{entry[0]}|{entry[1]}|{entry[2]}|{entry[3]}|{entry[4]}"
              return hashlib.sha256(key_str.encode()).hexdigest()[:12]

          def strip_html(html):
              html = re.sub(r'<\s*/?\s*br\s*/?\s*>', ' ', html, flags=re.IGNORECASE)
              text = re.sub(r'<[^>]+>', '', html)
              return text.replace('&amp;', '&').replace('&lt;', '<').replace('&gt;', '>').strip()

          def extract_apply_url(raw):
              m = re.search(r'href=["\']([^"\']+)["\']', raw)
              if m:
                  return m.group(1)
              m = re.search(r'\]\(([^)\s]+)', raw)
              if m:
                  return m.group(1)
              return ""

          def extract_section(text, start_marker, end_marker):
              start_idx = text.find(start_marker)
              if start_idx == -1:
                  return ""
              end_idx = text.find(end_marker, start_idx + len(start_marker))
              if end_idx == -1:
                  end_idx = len(text)
              return text[start_idx:end_idx]

          def parse_html_rows(section_text, term_col, apply_col, default_term):
              rows = []
              last_company = None
              min_cells = max(apply_col, term_col or 0) + 1
              for tr_match in re.finditer(r'<tr>\s*(.*?)\s*</tr>', section_text, re.DOTALL):
                  cells = re.findall(r'<td>(.*?)</td>', tr_match.group(1), re.DOTALL)
                  if len(cells) < min_cells:
                      continue
                  company = strip_html(cells[0])
                  if company == "↳":
                      company = last_company or "↳"
                  else:
                      last_company = company
                  term = strip_html(cells[term_col]) if term_col is not None else default_term
                  rows.append([
                      company,
                      strip_html(cells[1]),
                      strip_html(cells[2]),
                      term,
                      extract_apply_url(cells[apply_col]),
                  ])
              return rows

          def parse_markdown_rows(section_text, role_col=1, loc_col=2, apply_col=3,
                                  term_col=4, default_term=None, min_cells=5, strip_bold=False):
              # Defaults reproduce the original Vansh behavior byte-for-byte. Zapply overrides
              # apply_col=5 / term_col=None / min_cells=6 / strip_bold=True for its 6-col table
              # whose company cells are bold (**Name**) and whose Posted/Visa cols are unusable.
              rows = []
              last_company = None
              for line in section_text.splitlines():
                  body = line.strip()
                  if not body.startswith('|'):
                      continue
                  parts = [c.strip() for c in body.strip('|').split('|')]
                  if len(parts) < min_cells:
                      continue
                  if all(re.fullmatch(r'[-:\s]+', c) for c in parts if c):
                      continue
                  if parts[0].lower().replace('*', '') == 'company':
                      continue
                  company = strip_html(parts[0])
                  if strip_bold:
                      company = company.replace('**', '').strip()
                  if company == "↳":
                      company = last_company or "↳"
                  else:
                      last_company = company
                  term = default_term if term_col is None else strip_html(parts[term_col])
                  rows.append([
                      company,
                      strip_html(parts[role_col]),
                      strip_html(parts[loc_col]),
                      term,
                      extract_apply_url(parts[apply_col]),
                  ])
              return rows

          def fmt(entry):
              company, role, location, term, apply_url = entry[0], entry[1], entry[2], entry[3], entry[4]
              base = f"{company} — {role} | {location} | {term}"
              if apply_url:
                  return f"{base}\n  {apply_url}"
              return base

          def row_key(r):
              return (r[0], r[1], r[2], r[3])

          # --- Load and migrate state ---
          if STATE_FILE.exists():
              state = json.loads(STATE_FILE.read_text())
          else:
              state = {}

          # Migrate old {"last_sha": ...} shape to keyed-by-repo shape.
          if "last_sha" in state and isinstance(state.get("last_sha"), str):
              state = {"SimplifyJobs/Summer2026-Internships": {"last_sha": state["last_sha"]}}

          if BOT_STATE_FILE.exists():
              bot_state = json.loads(BOT_STATE_FILE.read_text())
          else:
              bot_state = {}
          bot_state.setdefault("telegram", {"last_update_id": 0})
          bot_state.setdefault("pending", {})

          # --- Process each watcher ---
          total_alerted = 0
          for w in WATCHERS:
              if not w.get("enabled", True):
                  continue
              repo_full = f"{w['owner']}/{w['repo']}"
              state_key = w["state_key"]
              latest = get_json(f"https://api.github.com/repos/{repo_full}/commits/{w['branch']}")
              latest_sha = latest["sha"]
              saved = state.get(state_key) or {}
              last_sha = saved.get("last_sha")
              prev_rows = saved.get("rows")

              # --- Churn-tolerant cumulative-URL dedup (opt-in via "dedup": "cumulative_url").
              # Keys jobs by apply URL and never re-alerts a URL once seen, so rows flapping in
              # and out of Zapply's ~100-row fresh window don't produce duplicate alerts. State
              # shape is {last_sha, seen: [url, ...]} instead of {last_sha, rows: [...]}. Sources
              # without a "dedup" key skip this block and use the snapshot-diff path below. ---
              if w.get("dedup") == "cumulative_url":
                  seen_list = saved.get("seen")
                  if last_sha == latest_sha and seen_list is not None:
                      continue
                  try:
                      file_text = get_raw_file(w["owner"], w["repo"], latest_sha, w["file"])
                  except urllib.error.HTTPError as e:
                      print(f"Failed to fetch {w['file']} at {latest_sha}: {e}")
                      continue
                  section_text = extract_section(file_text, w["section_start"], w["section_end"])
                  curr_rows = parse_markdown_rows(
                      section_text,
                      role_col=w.get("role_col", 1),
                      loc_col=w.get("loc_col", 2),
                      apply_col=w["apply_col"],
                      term_col=w["term_col"],
                      default_term=w["default_term"],
                      min_cells=w.get("min_cells", 5),
                      strip_bold=w.get("strip_bold", False),
                  )
                  if not curr_rows:
                      # Unconditional empty-guard: a bad marker / format change never seeds an
                      # empty set nor advances the SHA — just log and retry on the next run.
                      print(f"WARNING: extracted 0 rows from {state_key}; skipping (markers/format may have changed).")
                      continue
                  curr_urls = [r[4] for r in curr_rows if r[4]]
                  if seen_list is None:
                      # Silent bootstrap: seed the currently-listed URLs, alert nothing.
                      print(f"Bootstrapped {state_key} at {latest_sha} with {len(curr_urls)} seen URLs.")
                      state[state_key] = {"last_sha": latest_sha, "seen": curr_urls[-URL_CAP:]}
                      continue
                  seen_set = set(seen_list)
                  new_listings = [r for r in curr_rows if r[4] and r[4] not in seen_set]
                  for entry in new_listings:
                      h = job_hash(entry, w["label"])
                      text = f"{w['label']}\n+ {fmt(entry)}"
                      try:
                          message_id, chat_id = telegram_send_job(text, f"apply:{h}")
                      except Exception as exc:
                          print(f"Failed to send job alert ({h}): {exc}")
                          continue
                      bot_state["pending"][h] = {
                          "company": entry[0],
                          "role": entry[1],
                          "location": entry[2],
                          "term": entry[3],
                          "apply_url": entry[4],
                          "source": w["label"],
                          "message_id": message_id,
                          "chat_id": chat_id,
                      }
                      total_alerted += 1
                  # Append only genuinely-new URLs (preserves recency order), then cap.
                  merged = seen_list + [u for u in curr_urls if u not in seen_set]
                  state[state_key] = {"last_sha": latest_sha, "seen": merged[-URL_CAP:]}
                  continue

              # Skip only when SHA unchanged AND we already have a row snapshot.
              if last_sha == latest_sha and prev_rows is not None:
                  continue

              try:
                  file_text = get_raw_file(w["owner"], w["repo"], latest_sha, w["file"])
              except urllib.error.HTTPError as e:
                  print(f"Failed to fetch {w['file']} at {latest_sha}: {e}")
                  continue

              section_text = extract_section(file_text, w["section_start"], w["section_end"])
              if w["parser"] == "html":
                  curr_rows = parse_html_rows(section_text, w["term_col"], w["apply_col"], w["default_term"])
              else:
                  curr_rows = parse_markdown_rows(section_text)

              if prev_rows and not curr_rows:
                  print(f"WARNING: extracted 0 rows from {state_key} but had {len(prev_rows)} previously; skipping state update.")
                  continue

              new_state = {"last_sha": latest_sha, "rows": curr_rows}

              if prev_rows is None:
                  print(f"Bootstrapped {state_key} at {latest_sha} with {len(curr_rows)} rows.")
                  state[state_key] = new_state
                  continue

              prev_keys = {row_key(r) for r in prev_rows}
              new_listings = [r for r in curr_rows if row_key(r) not in prev_keys]

              for entry in new_listings:
                  h = job_hash(entry, w["label"])
                  text = f"{w['label']}\n+ {fmt(entry)}"
                  try:
                      message_id, chat_id = telegram_send_job(text, f"apply:{h}")
                  except Exception as exc:
                      print(f"Failed to send job alert ({h}): {exc}")
                      continue
                  bot_state["pending"][h] = {
                      "company": entry[0],
                      "role": entry[1],
                      "location": entry[2],
                      "term": entry[3],
                      "apply_url": entry[4],
                      "source": w["label"],
                      "message_id": message_id,
                      "chat_id": chat_id,
                  }
                  total_alerted += 1

              state[state_key] = new_state

          if total_alerted:
              print(f"Sent {total_alerted} job alert(s).")
          else:
              print("No new listings.")

          STATE_FILE.write_text(json.dumps(state, indent=2) + "\n")
          BOT_STATE_FILE.write_text(json.dumps(bot_state, indent=2) + "\n")
          PY

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .watcher_state.json .bot_state.json
          git diff --cached --quiet || git commit -m "Update watcher state"
          for attempt in 1 2 3 4 5; do
            if git pull --rebase origin main && git push; then
              exit 0
            fi
            echo "Push attempt $attempt failed; sleeping before retry..."
            sleep $((attempt * 2))
          done
          echo "Push failed after 5 attempts" >&2
          exit 1

  process_applies:
    needs: watch
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Check out this repo
        uses: actions/checkout@v4

      - name: Pull latest (pick up watch job's commit)
        run: |
          for attempt in 1 2 3; do
            if git pull --rebase origin main; then
              exit 0
            fi
            echo "Pull attempt $attempt failed; sleeping before retry..."
            sleep $((attempt * 2))
          done
          echo "Pull failed after 3 attempts" >&2
          exit 1

      - name: Install Google auth deps
        run: pip install --quiet google-auth==2.35.0

      - name: Process callbacks
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          APPLICATIONS_SHEET_ID: ${{ secrets.APPLICATIONS_SHEET_ID }}
          APPLICATIONS_SHEET_RANGE: ${{ vars.APPLICATIONS_SHEET_RANGE || 'Applications!A:F' }}
        run: |
          python - <<'PY'
          import datetime
          import json
          import os
          import pathlib
          import time
          import urllib.error
          import urllib.parse
          import urllib.request
          import zoneinfo

          from google.oauth2 import service_account
          from google.auth.transport.requests import Request as GoogleAuthRequest

          BOT_STATE_FILE = pathlib.Path(".bot_state.json")
          TG_TOKEN = os.environ["TELEGRAM_BOT_TOKEN"]
          SHEET_ID = os.environ["APPLICATIONS_SHEET_ID"]
          SHEET_RANGE = os.environ["APPLICATIONS_SHEET_RANGE"]

          def urlopen_with_retry(req, attempts=3):
              for i in range(attempts):
                  try:
                      return urllib.request.urlopen(req)
                  except (urllib.error.URLError, ConnectionResetError, TimeoutError) as e:
                      if isinstance(e, urllib.error.HTTPError) and e.code < 500:
                          raise
                      if i + 1 == attempts:
                          raise
                      print(f"Network retry {i + 1}/{attempts}: {type(e).__name__}: {e}")
                      time.sleep(2 ** i)

          def tg_call(method, payload):
              req = urllib.request.Request(
                  f"https://api.telegram.org/bot{TG_TOKEN}/{method}",
                  data=json.dumps(payload).encode(),
                  method="POST",
                  headers={"Content-Type": "application/json"},
              )
              try:
                  with urlopen_with_retry(req) as resp:
                      return json.loads(resp.read().decode())
              except urllib.error.HTTPError as e:
                  print(f"Telegram {method} failed: {e.code} {e.read().decode()}")
                  return None

          def get_updates(offset):
              params = {"timeout": 0, "allowed_updates": json.dumps(["callback_query"])}
              if offset:
                  params["offset"] = offset
              url = f"https://api.telegram.org/bot{TG_TOKEN}/getUpdates?" + urllib.parse.urlencode(params)
              try:
                  with urlopen_with_retry(url) as resp:
                      return json.loads(resp.read().decode())
              except urllib.error.HTTPError as e:
                  body = e.read().decode(errors="replace")
                  print(f"getUpdates failed: HTTP {e.code} {body}")
                  raise

          def get_webhook_info():
              url = f"https://api.telegram.org/bot{TG_TOKEN}/getWebhookInfo"
              with urlopen_with_retry(url) as resp:
                  return json.loads(resp.read().decode())

          def delete_webhook():
              url = f"https://api.telegram.org/bot{TG_TOKEN}/deleteWebhook?drop_pending_updates=false"
              with urlopen_with_retry(url) as resp:
                  return json.loads(resp.read().decode())

          def get_me():
              url = f"https://api.telegram.org/bot{TG_TOKEN}/getMe"
              with urlopen_with_retry(url) as resp:
                  return json.loads(resp.read().decode())

          def sheets_credentials():
              info = json.loads(os.environ["GOOGLE_SERVICE_ACCOUNT_JSON"])
              creds = service_account.Credentials.from_service_account_info(
                  info,
                  scopes=["https://www.googleapis.com/auth/spreadsheets"],
              )
              creds.refresh(GoogleAuthRequest())
              return creds

          def append_row(creds, row):
              url = (
                  f"https://sheets.googleapis.com/v4/spreadsheets/{SHEET_ID}"
                  f"/values/{urllib.parse.quote(SHEET_RANGE)}:append"
                  "?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS"
              )
              req = urllib.request.Request(
                  url,
                  data=json.dumps({"values": [row]}).encode(),
                  method="POST",
                  headers={
                      "Authorization": f"Bearer {creds.token}",
                      "Content-Type": "application/json",
                  },
              )
              with urlopen_with_retry(req) as resp:
                  resp.read()

          if not BOT_STATE_FILE.exists():
              print("No .bot_state.json yet; nothing to process.")
              raise SystemExit(0)

          bot_state = json.loads(BOT_STATE_FILE.read_text())
          bot_state.setdefault("telegram", {"last_update_id": 0})
          bot_state.setdefault("pending", {})
          bot_state.setdefault("applied", {})

          me = get_me().get("result") or {}
          print(f"Bot identity: id={me.get('id')} username=@{me.get('username')} name={me.get('first_name')!r}")

          info = (get_webhook_info().get("result") or {})
          print(
              f"Webhook info: url={info.get('url')!r} "
              f"pending_update_count={info.get('pending_update_count')} "
              f"last_error={info.get('last_error_message')!r}"
          )
          if info.get("url"):
              print("WARNING: webhook is set — deleting so getUpdates can return queued callbacks.")
              delete_webhook()

          last_id = bot_state["telegram"]["last_update_id"]
          offset = last_id + 1 if last_id else 0
          updates = get_updates(offset).get("result", [])

          print(f"Received {len(updates)} update(s); pending hashes: {sorted(bot_state['pending'].keys())}")

          if not updates:
              print("No new updates.")
              raise SystemExit(0)

          creds = None
          processed = 0

          def advance_offset(uid):
              bot_state["telegram"]["last_update_id"] = max(
                  bot_state["telegram"]["last_update_id"], uid
              )

          for upd in updates:
              update_id = upd["update_id"]
              cb = upd.get("callback_query")
              if not cb:
                  print(f"  update {update_id}: no callback_query, skipping")
                  advance_offset(update_id)
                  continue
              data = cb.get("data") or ""
              if not data.startswith("apply:"):
                  print(f"  update {update_id}: non-apply callback data {data!r}")
                  tg_call("answerCallbackQuery", {"callback_query_id": cb["id"]})
                  advance_offset(update_id)
                  continue

              h = data.split(":", 1)[1]
              job = bot_state["pending"].get(h)
              if not job:
                  print(f"  update {update_id}: callback hash {h!r} not in pending — already logged or stale")
                  tg_call("answerCallbackQuery", {
                      "callback_query_id": cb["id"],
                      "text": "Already logged",
                  })
                  advance_offset(update_id)
                  continue

              if creds is None:
                  try:
                      creds = sheets_credentials()
                  except Exception as e:
                      print(f"sheets_credentials failed: {type(e).__name__}: {e}")
                      tg_call("answerCallbackQuery", {
                          "callback_query_id": cb["id"],
                          "text": "Sheet credentials failed — will retry next run",
                          "show_alert": True,
                      })
                      break

              local_now = datetime.datetime.now(zoneinfo.ZoneInfo("America/Los_Angeles"))
              applied_at = datetime.datetime.utcnow().replace(microsecond=0).isoformat() + "Z"
              applied_date = f"{local_now.month}/{local_now.day}/{local_now.year}"
              row = [
                  job["company"],
                  job["role"],
                  applied_date,
                  "",
                  "Telegram Bot",
                  "Applied",
              ]
              try:
                  append_row(creds, row)
              except urllib.error.HTTPError as e:
                  print(f"Sheets append failed for {h}: {e.code} {e.read().decode()}")
                  tg_call("answerCallbackQuery", {
                      "callback_query_id": cb["id"],
                      "text": "Sheet update failed — will retry next run",
                      "show_alert": True,
                  })
                  break

              tg_call("answerCallbackQuery", {
                  "callback_query_id": cb["id"],
                  "text": "Logged ✅",
              })
              tg_call("editMessageText", {
                  "chat_id": job["chat_id"],
                  "message_id": job["message_id"],
                  "text": (
                      f"{job['source']}\n+ {job['company']} — {job['role']} | "
                      f"{job['location']} | {job['term']}"
                      + (f"\n  {job['apply_url']}" if job.get('apply_url') else "")
                      + f"\n\n✅ Logged {applied_at}"
                  ),
                  "disable_web_page_preview": True,
                  "reply_markup": {"inline_keyboard": []},
              })

              bot_state["applied"][h] = {**job, "applied_at": applied_at}
              del bot_state["pending"][h]
              advance_offset(update_id)
              processed += 1
              print(f"  logged {h} → {job['company']} / {job['role']}")

          BOT_STATE_FILE.write_text(json.dumps(bot_state, indent=2) + "\n")
          print(f"Processed {processed} apply callback(s); offset now {bot_state['telegram']['last_update_id']}.")
          PY

      - name: Commit updated bot state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .bot_state.json
          git diff --cached --quiet || git commit -m "Process apply callbacks"
          for attempt in 1 2 3 4 5; do
            if git pull --rebase origin main && git push; then
              exit 0
            fi
            echo "Push attempt $attempt failed; sleeping before retry..."
            sleep $((attempt * 2))
          done
          echo "Push failed after 5 attempts" >&2
          exit 1
