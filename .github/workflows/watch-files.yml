name: Watch files in external repo

on:
  schedule:
    - cron: "7,17,27,37,47,57 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest

    steps:
      - name: Check out this repo
        uses: actions/checkout@v4

      - name: Run watcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<'PY'
          import json
          import os
          import pathlib
          import urllib.request
          import urllib.parse

          OWNER = "SimplifyJobs"
          REPO = "Summer2026-Internships"
          BRANCH = "dev"

          WATCHED_FILES = {
              "README-Off-Season.md"
          }

          STATE_FILE = pathlib.Path(".watcher_state.json")

          def get_json(url):
              req = urllib.request.Request(
                  url,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "User-Agent": "github-actions-file-watcher",
                  },
              )
              with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read().decode())

          def send_telegram(text):
              token = os.environ["TELEGRAM_BOT_TOKEN"]
              chat_id = os.environ["TELEGRAM_CHAT_ID"]
              data = urllib.parse.urlencode({
                  "chat_id": chat_id,
                  "text": text,
                  "disable_web_page_preview": "true",
              }).encode()
              req = urllib.request.Request(
                  f"https://api.telegram.org/bot{token}/sendMessage",
                  data=data,
                  method="POST",
              )
              with urllib.request.urlopen(req) as resp:
                  resp.read()

          latest = get_json(f"https://api.github.com/repos/{OWNER}/{REPO}/commits/{BRANCH}")
          latest_sha = latest["sha"]

          if STATE_FILE.exists():
              state = json.loads(STATE_FILE.read_text())
              last_sha = state.get("last_sha")
          else:
              last_sha = None

          if not last_sha:
              STATE_FILE.write_text(json.dumps({"last_sha": latest_sha}, indent=2))
              print("Initialized watcher.")
              raise SystemExit(0)

          if last_sha == latest_sha:
              send_telegram("No changes.")
              print("No new commits.")
              raise SystemExit(0)

          import re

          def strip_html(html):
              text = re.sub(r'<[^>]+>', '', html)
              return text.replace('&amp;', '&').replace('&lt;', '<').replace('&gt;', '>').strip()

          def collect_row(lines, i, prefix):
              cells = []
              i += 1
              while i < len(lines):
                  l = lines[i]
                  raw = l[1:] if l and l[0] in ('+', '-', ' ') else l
                  s = raw.strip()
                  if not l.startswith(prefix):
                      return None, i
                  if s == '</tr>':
                      return cells, i + 1
                  if s.startswith('<td>'):
                      buf = s[4:]
                      while '</td>' not in buf and i + 1 < len(lines):
                          i += 1
                          r2 = lines[i][1:] if lines[i] and lines[i][0] in ('+', '-', ' ') else lines[i]
                          buf += ' ' + r2.strip()
                      if buf.endswith('</td>'):
                          buf = buf[:-5]
                      cells.append(strip_html(buf))
                  i += 1
              return None, i

          def parse_job_changes(patch):
              added, removed = [], []
              lines = patch.splitlines()
              i = 0
              while i < len(lines):
                  l = lines[i]
                  raw = l[1:] if l and l[0] in ('+', '-', ' ') else l
                  if raw.strip() == '<tr>':
                      if l.startswith('+'):
                          cells, i = collect_row(lines, i, '+')
                          if cells and len(cells) >= 4:
                              added.append(cells)
                          continue
                      elif l.startswith('-'):
                          cells, i = collect_row(lines, i, '-')
                          if cells and len(cells) >= 4:
                              removed.append(cells)
                          continue
                  i += 1
              return added, removed

          def fmt(cells):
              company, role, location, term = cells[0], cells[1], cells[2], cells[3]
              return f"{company} — {role} | {location} | {term}"

          compare = get_json(f"https://api.github.com/repos/{OWNER}/{REPO}/compare/{last_sha}...{latest_sha}")
          changed_files = compare.get("files", [])
          matched_files = [f for f in changed_files if f["filename"] in WATCHED_FILES]

          if matched_files:
              compare_url = compare.get("html_url", f"https://github.com/{OWNER}/{REPO}/compare/{last_sha}...{latest_sha}")
              added, removed = [], []
              for f in matched_files:
                  a, r = parse_job_changes(f.get("patch", ""))
                  added.extend(a)
                  removed.extend(r)

              msg_parts = [f"Job board updated in {OWNER}/{REPO}", f"Branch: {BRANCH}"]
              if added:
                  msg_parts += ["", f"New listings ({len(added)}):"]
                  msg_parts += [f"+ {fmt(c)}" for c in added]
              if removed:
                  msg_parts += ["", f"Removed listings ({len(removed)}):"]
                  msg_parts += [f"- {fmt(c)}" for c in removed]
              if not added and not removed:
                  msg_parts += ["", "(counter/metadata updates only)"]
              msg_parts += ["", compare_url]
              send_telegram("\n".join(msg_parts))
              print("Sent Telegram alert.")
          else:
              send_telegram("No changes.")
              print("Commits happened, but not in watched files.")

          STATE_FILE.write_text(json.dumps({"last_sha": latest_sha}, indent=2))
          PY

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .watcher_state.json
          git diff --cached --quiet || git commit -m "Update watcher state"
          git push
